<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    
    <meta name="author" content="Nguyễn Anh Vũ">
    <meta name="contact" content="navuitag@gmail.com">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Trung tâm học tập EdTech — Toán, Sinh, Hóa, Lý, Văn, Tin, Anh">
    <meta name="theme-color" content="#20a36b">
    <title>EdTech Hub — Chọn môn học</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7fbff;
        --text: #193f65;
        --muted: #5f7d98;
        --line: #d8e6f2;
        --green: #20a36b;
        --surface: #fff;
      }

      * { box-sizing: border-box; }

      body {
        background: radial-gradient(circle at top right, rgba(32, 163, 107, 0.12), transparent 32%), var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      .wrap {
        margin: 0 auto;
        max-width: 1080px;
        padding: 48px 20px 64px;
      }

      h1 {
        font-size: clamp(28px, 4vw, 40px);
        margin: 0 0 10px;
      }

      .lead {
        color: var(--muted);
        font-size: 18px;
        line-height: 1.5;
        margin: 0 0 32px;
        max-width: 640px;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(25, 63, 101, 0.08);
        color: inherit;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 150px;
        padding: 22px;
        text-decoration: none;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .card:hover {
        box-shadow: 0 14px 32px rgba(25, 63, 101, 0.12);
        transform: translateY(-2px);
      }

      .emoji { font-size: 30px; line-height: 1; }
      .card strong { font-size: 18px; }
      .card span { color: var(--muted); font-size: 14px; font-weight: 600; }

      .hub-author {
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 14px;
        margin-top: 40px;
        padding-top: 24px;
        text-align: center;
      }

      .hub-author strong { color: var(--text); }
      .hub-author a { color: var(--text); font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>EdTech Hub</h1>
      <p class="lead">Chọn môn học để bắt đầu. Các ứng dụng hoạt động offline (PWA) và lưu tiến độ theo từng người học trên thiết bị.</p>
      <div class="grid" id="appGrid"></div>
      <footer class="hub-author">
        <p><strong>Tác giả · Nguyễn Anh Vũ</strong></p>
        <p><a href="mailto:navuitag@gmail.com">navuitag@gmail.com</a> · <a href="tel:+84986201079">0986201079</a></p>
      </footer>
    </div>
    <script>
      const BASE_URL = "https://navuitag.github.io";

      const APPS = [
        { emoji: "📐", short: "Toán", name: "MathFlow VN", repo: "MathFlow", start: "#/home" },
        { emoji: "🧬", short: "Sinh học", name: "BioFlow VN", repo: "bioflow", start: "#/home" },
        { emoji: "⚗️", short: "Hóa học", name: "ChemFlow VN", repo: "chemflow", start: "#/home" },
        { emoji: "⚡", short: "Vật lí", name: "PhyFlow VN", repo: "phyflow", start: "#/home" },
        { emoji: "📖", short: "Ngữ văn", name: "LiteratureFlow VN", repo: "literatureflow", start: "#/home" },
        { emoji: "💻", short: "Tin học", name: "ITflow VN", repo: "ITflow", start: "#/home" },
        { emoji: "🇬🇧", short: "Tiếng Anh", name: "EnglishFlow", repo: "englishflow", start: "#/home" },
        { emoji: "🗣️", short: "Anh 60 ngày", name: "EngCoach", repo: "engcoach", start: "#/dashboard" }
      ].map((app) => ({
        ...app,
        href: `${BASE_URL}/${app.repo}/index.html${app.start}`
      }));

      document.getElementById("appGrid").innerHTML = APPS.map((app) => `
        <a class="card" href="${app.href}">
          <span class="emoji" aria-hidden="true">${app.emoji}</span>
          <strong>${app.short}</strong>
          <span>${app.name}</span>
        </a>
      `).join("");
    </script>
  </body>
</html>
